<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 FIFA World Cup 竞彩看板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Teko:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        :root{
            --gold:#D4AF37;--gold-light:#F5D76E;--gold-dark:#B8860B;
            --win:#2ecc71;--loss:#e74c3c;--draw:#f39c12;
            --card:rgba(10,10,10,0.65);--card-border:rgba(212,175,55,0.12);
            --text:#eee;--text-sec:rgba(255,255,255,0.65);--text-dim:rgba(255,255,255,0.35);
            --glass:solid 1px rgba(255,255,255,0.06);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{font-family:'Noto Sans SC',sans-serif;min-height:100vh;color:var(--text);overflow-x:hidden;background:#060608;position:relative;}
        body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;background:
            radial-gradient(ellipse 80% 60% at 50% 0%,rgba(212,175,55,0.10) 0%,transparent 50%),
            radial-gradient(ellipse 50% 40% at 20% 20%,rgba(46,204,113,0.04) 0%,transparent 50%),
            radial-gradient(ellipse 50% 40% at 80% 20%,rgba(52,152,219,0.04) 0%,transparent 50%),
            radial-gradient(ellipse 100% 60% at 50% 100%,rgba(212,175,55,0.06) 0%,transparent 60%);
            pointer-events:none;}
        body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;z-index:1;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity:0.025;pointer-events:none;}

        .light-beams{position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;overflow:hidden;pointer-events:none;}
        .beam{position:absolute;top:-20%;width:1px;height:150%;background:linear-gradient(180deg,rgba(255,255,255,0.08) 0%,transparent 50%);transform-origin:top center;animation:sweep 10s ease-in-out infinite;}
        .beam:nth-child(1){left:25%;animation-delay:0s;transform:rotate(-12deg)}
        .beam:nth-child(2){left:50%;animation-delay:3s;transform:rotate(0deg);width:2px}
        .beam:nth-child(3){left:75%;animation-delay:6s;transform:rotate(12deg)}
        @keyframes sweep{0%,100%{opacity:0.2}50%{opacity:0.5}}

        .container{max-width:960px;margin:0 auto;padding:0 16px;position:relative;z-index:2}

        /* HEADER */
        header{text-align:center;padding:36px 16px 16px;position:relative}
        .host-nations{display:flex;justify-content:center;align-items:center;gap:20px;margin-bottom:12px}
        .host-flag{font-size:2.2rem;filter:drop-shadow(0 4px 10px rgba(0,0,0,0.5));transition:all .3s;cursor:default}
        .host-flag:hover{transform:scale(1.12) translateY(-2px)}
        .host-divider{width:1px;height:24px;background:linear-gradient(180deg,transparent,var(--gold),transparent)}
        .wc-title{font-family:'Teko',sans-serif;font-size:clamp(2rem,6.5vw,3.4rem);font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:linear-gradient(135deg,var(--gold-light) 0%,var(--gold) 50%,var(--gold-dark) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative}
        .wc-title::after{content:'2026';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);font-size:0.8rem;letter-spacing:0.3em;-webkit-text-fill-color:rgba(212,175,55,0.25);font-family:'Oswald',sans-serif}
        .wc-subtitle{font-family:'Oswald',sans-serif;font-size:0.75rem;letter-spacing:0.35em;color:var(--text-dim);text-transform:uppercase;margin-top:10px}
        .trophy-icon{font-size:2rem;margin-top:12px;animation:float 5s ease-in-out infinite;filter:drop-shadow(0 0 16px rgba(212,175,55,0.4))}
        @keyframes float{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-6px) rotate(2deg)}}
        .sync-line{text-align:center;margin:10px 0 6px;font-size:0.7rem;color:var(--text-dim);letter-spacing:0.06em;font-family:'Oswald',sans-serif}
        .sync-line .dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--win);margin-right:6px;vertical-align:middle;animation:pulse 2s ease-in-out infinite;box-shadow:0 0 8px var(--win)}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}

        /* SECTIONS */
        .section{background:var(--card);backdrop-filter:blur(24px);border-radius:16px;padding:20px;margin:16px 0;border:var(--glass);box-shadow:0 4px 24px rgba(0,0,0,0.3);position:relative;overflow:hidden}
        .section::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,0.2),transparent)}
        .section-title{font-family:'Oswald',sans-serif;font-size:0.9rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:8px}
        .section-title .icon{font-size:1rem}

        /* SCROLL CONTAINER */
        .scroll-container{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:rgba(212,175,55,0.2) transparent;padding-bottom:8px;margin:0 -6px}
        .scroll-container::-webkit-scrollbar{height:4px}
        .scroll-container::-webkit-scrollbar-track{background:transparent}
        .scroll-container::-webkit-scrollbar-thumb{background:rgba(212,175,55,0.2);border-radius:2px}
        .scroll-wrapper{display:flex;gap:12px;padding:4px 6px;min-width:min-content}

        /* MATCH CARDS */
        .match-card{flex:0 0 300px;background:linear-gradient(160deg,rgba(20,20,20,0.8),rgba(10,10,10,0.6));border-radius:14px;padding:16px;border:1px solid rgba(212,175,55,0.15);position:relative;transition:all .3s ease}
        .match-card:hover{transform:translateY(-3px);border-color:rgba(212,175,55,0.3);box-shadow:0 8px 30px rgba(0,0,0,0.4)}
        .match-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.6}
        .match-time{display:flex;align-items:center;justify-content:center;gap:6px;font-size:0.7rem;color:var(--gold);margin-bottom:10px;padding:4px 10px;background:rgba(212,175,55,0.08);border-radius:16px;border:1px solid rgba(212,175,55,0.15)}
        .match-time .time{font-family:'Teko',sans-serif;font-size:0.9rem}
        .match-teams{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
        .team{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
        .team-flag-lg{font-size:2.6rem;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.4))}
        .team-name{font-weight:700;font-size:0.9rem}
        .vs-center{display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 12px}
        .vs-text{font-family:'Teko',sans-serif;font-size:1.3rem;color:var(--gold);font-weight:700}
        .match-type{font-size:0.6rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em}
        .match-history{background:rgba(0,0,0,0.25);border-radius:10px;padding:10px;margin-bottom:10px;border-left:2px solid rgba(212,175,55,0.3)}
        .history-title{font-size:0.65rem;color:var(--gold);margin-bottom:4px;font-weight:600}
        .history-content{font-size:0.7rem;color:var(--text-sec);line-height:1.5}
        .ai-prediction{display:flex;align-items:center;justify-content:center;gap:10px;padding:8px;background:linear-gradient(90deg,rgba(46,204,113,0.06),rgba(243,156,18,0.06),rgba(231,76,60,0.06));border-radius:10px;border:1px solid rgba(255,255,255,0.06)}
        .pred-item{display:flex;flex-direction:column;align-items:center;gap:1px}
        .pred-label{font-size:0.55rem;color:var(--text-dim);text-transform:uppercase}
        .pred-value{font-family:'Teko',sans-serif;font-size:1.2rem;font-weight:700}
        .pred-win{color:var(--win)}.pred-draw{color:var(--draw)}.pred-loss{color:var(--loss)}
        .ai-tag{position:absolute;top:8px;right:8px;padding:2px 6px;border-radius:8px;font-size:0.55rem;font-weight:700;background:rgba(155,89,182,0.15);color:#9b59b6;border:1px solid rgba(155,89,182,0.2)}

        /* RESULT CARDS */
        .result-card{flex:0 0 260px;background:linear-gradient(160deg,rgba(20,20,20,0.7),rgba(10,10,10,0.5));border-radius:14px;padding:14px;border:1px solid rgba(255,255,255,0.06);position:relative;transition:all .3s ease}
        .result-card:hover{border-color:rgba(212,175,55,0.2);transform:translateY(-2px)}
        .result-card.winner{border-left:2px solid var(--win)}.result-card.loser{border-left:2px solid var(--loss)}
        .result-date{font-size:0.65rem;color:var(--text-dim);margin-bottom:8px;display:flex;align-items:center;gap:5px}
        .result-teams{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
        .result-team{display:flex;align-items:center;gap:6px}
        .result-team.away{flex-direction:row-reverse}
        .result-flag{font-size:1.6rem}.result-name{font-weight:600;font-size:0.85rem}
        .result-score{display:flex;align-items:center;gap:10px;font-family:'Teko',sans-serif}
        .score-box{padding:6px 12px;background:rgba(0,0,0,0.35);border-radius:6px;border:1px solid rgba(255,255,255,0.08)}
        .score-value{font-size:1.6rem;font-weight:700}.score-divider{color:var(--text-dim);font-size:1rem}
        .result-winner-badge{position:absolute;top:8px;right:8px;padding:2px 6px;border-radius:8px;font-size:0.55rem;font-weight:700}
        .result-scorers{font-size:0.65rem;color:var(--text-dim);margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.04)}

        /* STATS */
        .stats-board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0}
        .stat-card{background:var(--card);backdrop-filter:blur(20px);border-radius:12px;padding:16px 10px;text-align:center;border:var(--glass);position:relative;overflow:hidden;transition:all .3s ease}
        .stat-card:hover{transform:translateY(-3px);border-color:rgba(212,175,55,0.2)}
        .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.4}
        .stat-label{font-size:0.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;font-family:'Oswald',sans-serif}
        .stat-value{font-family:'Teko',sans-serif;font-size:1.8rem;font-weight:600;line-height:1}
        .stat-value.pos{color:var(--win);text-shadow:0 0 15px rgba(46,204,113,0.25)}
        .stat-value.neg{color:var(--loss);text-shadow:0 0 15px rgba(231,76,60,0.25)}

        /* CHART */
        .chart-wrap{position:relative;width:100%;height:300px;padding:8px 0}
        .chart-wrap canvas{width:100%!important;height:100%!important}

        /* LEADERBOARD */
        .lb-list{display:flex;flex-direction:column;gap:6px}
        .lb-item{display:flex;align-items:center;padding:12px 14px;background:rgba(255,255,255,0.02);border-radius:10px;border-left:3px solid transparent;transition:all .2s ease}
        .lb-item:hover{background:rgba(255,255,255,0.04);transform:translateX(3px)}
        .lb-item.r1{border-left-color:var(--gold);background:linear-gradient(90deg,rgba(212,175,55,0.06),transparent)}
        .lb-item.r2{border-left-color:#C0C0C0;background:linear-gradient(90deg,rgba(192,192,192,0.05),transparent)}
        .lb-item.r3{border-left-color:#CD7F32;background:linear-gradient(90deg,rgba(205,127,50,0.05),transparent)}
        .lb-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;margin-right:10px;flex-shrink:0;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08)}
        .lb-info{flex:1;min-width:0}
        .lb-name{font-weight:700;font-size:0.95rem}.lb-meta{font-size:0.7rem;color:var(--text-dim);margin-top:2px}
        .lb-profit{font-family:'Teko',sans-serif;font-size:1.5rem;font-weight:600;text-align:right}
        .lb-profit.pos{color:var(--win)}.lb-profit.neg{color:var(--loss)}

        /* PLAYER CARDS - COLLAPSIBLE */
        .player-grid{display:flex;flex-direction:column;gap:12px}
        .player-card{background:rgba(10,10,10,0.5);border-radius:14px;border:1px solid rgba(255,255,255,0.06);overflow:hidden;transition:all .3s}
        .player-card:hover{border-color:rgba(212,175,55,0.15)}
        .pc-header{display:flex;align-items:center;padding:14px 16px;cursor:pointer;user-select:none;transition:background .2s;gap:12px}
        .pc-header:hover{background:rgba(255,255,255,0.02)}
        .pc-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08)}
        .pc-info{flex:1;min-width:0}
        .pc-name{font-weight:700;font-size:1rem;display:flex;align-items:center;gap:8px}
        .pc-name .emoji{font-size:1.2rem}
        .pc-stats{display:flex;gap:8px;font-size:0.7rem;color:var(--text-dim);margin-top:3px;flex-wrap:wrap}
        .pc-stats span{padding:2px 8px;background:rgba(255,255,255,0.04);border-radius:12px}
        .pc-pnl{font-family:'Teko',sans-serif;font-size:1.6rem;font-weight:600;flex-shrink:0}
        .pc-pnl.pos{color:var(--win)}.pc-pnl.neg{color:var(--loss)}
        .pc-toggle{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;transition:all .3s;flex-shrink:0;font-size:0.7rem;color:var(--text-dim)}
        .pc-toggle.open{transform:rotate(180deg);background:rgba(212,175,55,0.1);color:var(--gold);border-color:rgba(212,175,55,0.2)}
        .pc-bets{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(0.4,0,0.2,1)}
        .pc-bets.open{max-height:2000px}
        .pc-bets-inner{padding:0 16px 14px}

        /* DATE GROUP */
        .date-group{margin-bottom:10px}
        .date-group-header{display:flex;align-items:center;gap:8px;padding:6px 0;margin-bottom:6px;cursor:pointer;user-select:none}
        .date-group-header .date-text{font-size:0.75rem;font-weight:700;color:var(--gold);letter-spacing:0.04em}
        .date-group-header .date-line{flex:1;height:1px;background:rgba(212,175,55,0.15)}
        .date-group-header .date-count{font-size:0.65rem;color:var(--text-dim);padding:1px 6px;background:rgba(212,175,55,0.1);border-radius:8px}
        .date-group-header .date-toggle{font-size:0.6rem;color:var(--text-dim);transition:transform .3s}
        .date-group-header .date-toggle.collapsed{transform:rotate(-90deg)}
        .date-group-bets{overflow:hidden;transition:max-height .3s ease}
        .date-group-bets.collapsed{max-height:0 !important}

        .pc-bet{padding:10px;background:rgba(0,0,0,0.2);border-radius:10px;margin-bottom:6px;border-left:3px solid transparent;transition:all .2s}
        .pc-bet:hover{background:rgba(0,0,0,0.3)}
        .pc-bet.win{border-left-color:var(--win)}.pc-bet.loss{border-left-color:var(--loss)}
        .pc-bet-date{font-size:0.68rem;color:var(--text-dim);margin-bottom:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
        .pc-bet-teams{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:5px}
        .team-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:14px;font-size:0.72rem;font-weight:600;color:#fff}
        .team-flag{font-size:0.9rem}.vs-text{font-size:0.65rem;color:var(--text-dim)}
        .pc-bet-detail{display:flex;justify-content:space-between;align-items:center;font-size:0.75rem;color:var(--text-sec);flex-wrap:wrap;gap:4px;margin-bottom:3px}
        .pc-bet-prediction{color:var(--text-dim);font-style:italic;font-size:0.7rem}
        .pc-bet-result{font-weight:600;font-size:0.8rem}
        .pc-bet-result.win{color:var(--win)}.pc-bet-result.loss{color:var(--loss)}
        .pc-bet-financials{display:flex;gap:12px;font-size:0.72rem;margin-top:4px;color:var(--text-sec)}
        .type-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:0.62rem;font-weight:600;background:rgba(212,175,55,0.12);color:var(--gold);border:1px solid rgba(212,175,55,0.15)}

        /* AI ANALYST */
        .ai-analyst-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
        .analyst-card{background:linear-gradient(160deg,rgba(20,20,20,0.7),rgba(10,10,10,0.5));border-radius:14px;padding:16px;border:1px solid rgba(212,175,55,0.1);position:relative;overflow:hidden;transition:all .3s ease}
        .analyst-card:hover{transform:translateY(-2px);border-color:rgba(212,175,55,0.2)}
        .analyst-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.4}
        .analyst-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.05)}
        .analyst-avatar{width:42px;height:42px;border-radius:50%;background:rgba(212,175,55,0.08);display:flex;align-items:center;justify-content:center;font-size:1.4rem;border:1px solid rgba(212,175,55,0.15)}
        .analyst-info{flex:1}
        .analyst-name{font-weight:700;font-size:1rem;color:var(--gold-light)}
        .analyst-tag{display:inline-block;padding:2px 7px;border-radius:8px;font-size:0.6rem;font-weight:600;margin-top:3px}
        .analyst-tag.bull{background:rgba(46,204,113,0.12);color:#2ecc71;border:1px solid rgba(46,204,113,0.2)}
        .analyst-tag.bear{background:rgba(231,76,60,0.12);color:#e74c3c;border:1px solid rgba(231,76,60,0.2)}
        .analyst-tag.gamble{background:rgba(155,89,182,0.12);color:#9b59b6;border:1px solid rgba(155,89,182,0.2)}
        .analyst-tag.hedge{background:rgba(52,152,219,0.12);color:#3498db;border:1px solid rgba(52,152,219,0.2)}
        .analyst-stats{display:flex;gap:6px;margin-bottom:10px;font-size:0.7rem;color:var(--text-dim);flex-wrap:wrap}
        .analyst-stats span{padding:2px 8px;background:rgba(255,255,255,0.03);border-radius:12px}
        .analyst-comment{font-size:0.8rem;line-height:1.6;color:var(--text-sec);font-style:italic}
        .analyst-comment p{margin-bottom:6px;padding-left:14px;position:relative}
        .analyst-comment p::before{content:'\203A';position:absolute;left:0;opacity:0.5;color:var(--gold);font-style:normal;font-weight:700}
        .ai-badge{position:absolute;top:10px;right:10px;padding:2px 8px;border-radius:12px;font-size:0.58rem;font-weight:700;letter-spacing:0.04em;background:rgba(212,175,55,0.08);color:var(--gold);border:1px solid rgba(212,175,55,0.15)}

        /* FOOTER */
        footer{text-align:center;padding:20px 0 30px;font-size:0.65rem;color:var(--text-dim);letter-spacing:0.05em}

        @media(max-width:640px){
            .stats-board{grid-template-columns:repeat(2,1fr);gap:8px}
            .ai-analyst-grid{grid-template-columns:1fr}
            .host-flag{font-size:1.8rem}
            .chart-wrap{height:240px}
            .beam{display:none}
            .match-card{flex:0 0 270px}
            .result-card{flex:0 0 240px}
        }
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:rgba(212,175,55,0.2);border-radius:2px}
    </style>
</head>
<body>
    <div class="light-beams">
        <div class="beam" style="--r:-12deg"></div>
        <div class="beam" style="--r:0deg"></div>
        <div class="beam" style="--r:12deg"></div>
    </div>

    <div class="container">
        <header>
            <div class="host-nations">
                <span class="host-flag">🇺🇸</span>
                <span class="host-divider"></span>
                <span class="host-flag">🇨🇦</span>
                <span class="host-divider"></span>
                <span class="host-flag">🇲🇽</span>
            </div>
            <div class="wc-title">FIFA World Cup</div>
            <div class="wc-subtitle">美加墨世界杯 · 竞彩看板</div>
            <div class="trophy-icon">🏆</div>
        </header>

        <div class="sync-line"><span class="dot"></span>LIVE · 最后更新: <span id="last-sync"></span></div>

        <div class="section">

    (function(){
        const playerBets={};bets.forEach(b=>{if(!playerBets[b.name])playerBets[b.name]=[];playerBets[b.name].push(b)});
        const players=Object.entries(playerBets).sort((a,b)=>{const pa=a[1].reduce((s,x)=>s+x.profit,0),pb=b[1].reduce((s,x)=>s+x.profit,0);return pb-pa});

        document.getElementById('player-detail').innerHTML=players.map(([name,bts])=>{
            const pnl=bts.reduce((s,b)=>s+b.profit,0),inv=bts.reduce((s,b)=>s+b.invest,0),wins=bts.filter(b=>b.result==='正确').length;
            const pc=pnl>=0?'pos':'neg',sign=pnl>=0?'+':'';
            const roi=inv>0?((pnl/inv)*100).toFixed(1):0;

            // Group bets by date
            const dateGroups={};
            bts.forEach(b=>{
                const dt=new Date(b.date),ds=`${dt.getMonth()+1}月${dt.getDate()}日`;
                if(!dateGroups[ds])dateGroups[ds]=[];dateGroups[ds].push(b);
            });

            const betHtml=Object.entries(dateGroups).map(([dateStr,dbts])=>{
                const dbetHtml=dbts.map(b=>{
                    const rc=b.result==='正确'?'win':'loss';
                    const tags=(b.type||[]).map(t=>`<span class="type-tag">${t}</span>`).join(' ');
                    return`<div class="pc-bet ${rc}">
                        <div class="pc-bet-date">${tags}</div>
                        <div class="pc-bet-teams">${renderTeams(b.game)}</div>
                        <div class="pc-bet-detail"><span class="pc-bet-prediction">预测: ${b.prediction}</span><span class="pc-bet-result ${rc}">${b.result==='正确'?'✓ 正确':'✗ 错误'}</span></div>
                        <div class="pc-bet-financials"><span>投入 ¥${b.invest}</span><span style="color:${b.profit>=0?'var(--win)':'var(--loss)'};font-weight:600">${b.profit>=0?'+':''}¥${b.profit}</span></div>
                    </div>`;
                }).join('');
                return`<div class="date-group">
                    <div class="date-group-header" onclick="toggleDate(this)">
                        <span class="date-text">${dateStr}</span><span class="date-line"></span><span class="date-count">${dbts.length}张</span><span class="date-toggle">▼</span>
                    </div>
                    <div class="date-group-bets">${dbetHtml}</div>
                </div>`;
            }).join('');

            return`<div class="player-card">
                <div class="pc-header" onclick="togglePlayer(this)">
                    <div class="pc-avatar">${getAvatar(name)}</div>
                    <div class="pc-info"><div class="pc-name">${name}</div><div class="pc-stats"><span>投入 ¥${inv}</span><span>${wins}胜${bts.length-wins}负</span><span>ROI ${roi}%</span></div></div>
                    <div class="pc-pnl ${pc}">${sign}¥${pnl.toLocaleString()}</div>
                    <div class="pc-toggle">▼</div>
                </div>
                <div class="pc-bets"><div class="pc-bets-inner">${betHtml}</div></div>
            </div>`;
        }).join('');

        // Default: first player open, rest closed
        const cards=document.querySelectorAll('.player-card');
        cards.forEach((c,i)=>{if(i===0){c.querySelector('.pc-bets').classList.add('open');c.querySelector('.pc-toggle').classList.add('open')}});
    })();

    // Toggle player card
    function togglePlayer(el){
        const bets=el.nextElementSibling,toggle=el.querySelector('.pc-toggle');
        bets.classList.toggle('open');toggle.classList.toggle('open');
    }
    // Toggle date group
    function toggleDate(el){
        const bets=el.nextElementSibling,toggle=el.querySelector('.date-toggle');
        bets.classList.toggle('collapsed');toggle.classList.toggle('collapsed');
    }

    // ===== AI ANALYST =====
    (function(){
        const analysis={
            '贾老师':{avatar:'🐺',tag:'hedge',tagText:'对冲型',comment:['典型的学院派打法，每单控制在20元以内，深谙「鸡蛋不放一个篮子」的道理。','虽胜率不高但懂得用半全场赔率回血，-20+58-10的波动曲线堪称教科书级风险控制。','建议：继续保持小额多频策略，但下次可以相信自己的直觉多押一点。']},
            '韦小宝':{avatar:'🦊',tag:'gamble',tagText:'梭哈型',comment:['江湖人称「比分终结者」，三连串一的胆子不是谁都有，可惜法国2:1差了一点。','从+43到-60的过山车告诉我们：比分玩法是暴富捷径，也是返贫快车。','建议：继续保持娱乐心态，但建议下次串关数量≤2，给运气留条后路。']},
            '张少':{avatar:'🐼',tag:'bear',tagText:'逆境型',comment:['目前战绩-82元暂居榜尾，但别慌，股市有句话叫「别人恐惧我贪婪」。','执着于法国让球平，三张票有俩押同一逻辑，这是信仰，也是执念。','建议：分散投资标的，世界杯不只有法国队。下次选「胜」可能比「平」更开心。']},
            '陈少':{avatar:'🦁',tag:'bull',tagText:'精准型',comment:['真正的大佬都是沉默寡言的，关键时刻一张100元大单直接封神。','167元盈利的秘诀：不玩虚的，看准了就下重注，ROI高达61.8%羡煞旁人。','建议：继续保持「少而精」的策略，但记得请其他三位喝奶茶。']}
        };
        const playerStats={};bets.forEach(b=>{if(!playerStats[b.name])playerStats[b.name]={pnl:0,inv:0,w:0,c:0};playerStats[b.name].pnl+=b.profit;playerStats[b.name].inv+=b.invest;playerStats[b.name].c++;if(b.result==='正确')playerStats[b.name].w++});
        const sortedPlayers=Object.entries(playerStats).sort((a,b)=>b[1].pnl-a[1].pnl);
        document.getElementById('ai-analyst').innerHTML=sortedPlayers.map(([name,stat])=>{
            const a=analysis[name]||{avatar:'🐾',tag:'hedge',tagText:'未知型',comment:['数据积累中，暂无法给出投资建议。']};
            const winRate=stat.c>0?(stat.w/stat.c*100).toFixed(0):0;
            const roi=stat.inv>0?((stat.pnl/stat.inv)*100).toFixed(1):0;
            return`<div class="analyst-card">
                <span class="ai-badge">AI LIVE</span>
                <div class="analyst-header"><div class="analyst-avatar">${a.avatar}</div><div class="analyst-info"><div class="analyst-name">${name}</div><span class="analyst-tag ${a.tag}">${a.tagText}</span></div></div>
                <div class="analyst-stats"><span>盈亏 ¥${stat.pnl}</span><span>胜率 ${winRate}%</span><span>ROI ${roi}%</span><span>${stat.c}张票</span></div>
                <div class="analyst-comment">${a.comment.map(c=>`<p>${c}</p>`).join('')}</div>
            </div>`}).join('');
    })();

    renderUpcomingMatches();
    renderFinishedMatches();
    </script>
</body>
</html>
